<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriScan UI Remaster</title>
  
  <!-- Pretendard 폰트 로드 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <div class="dashboard-container">
    <header class="dashboard-header">
      <h1 class="headline-large">NutriScan UI Master</h1>
      <p class="subtitle primary-text">Design Spec 100% Loaded (Web Version).</p>
    </header>

    <main class="dashboard-content">
      <!-- Premium Glass Card 컴포넌트 -->
      <div class="premium-glass-card">
        <h2 class="title-large">글래스모피즘 테스트</h2>
        <p class="body-medium">반투명 표면 및 깊이감 렌더링 검수 중</p>
      </div>

      <!-- Bouncing Gradient Button 컴포넌트 -->
      <button class="bouncing-gradient-button" id="scanButton">
        <span class="button-text">스캔 시작하기</span>
      </button>
    </main>
    
    <!-- 스낵바 (Toast) 메시지 -->
    <div id="snackbar">버튼 클릭 애니메이션이 재생되었습니다.</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
